<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Forms — OPTIMI</title>
<meta name="robots" content="noindex,nofollow"/>
</head>
<body>
<!-- Hidden form for Netlify build-time detection. Real form is on /coaching.html#audit -->
<form name="audit-coaching" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="text" name="prenom"/>
  <input type="text" name="nom"/>
  <input type="email" name="email"/>
  <input type="tel" name="telephone"/>
  <input type="text" name="nb-biens"/>
  <input type="text" name="zone"/>
  <input type="text" name="blocage"/>
  <input type="text" name="timing"/>
  <textarea name="message"></textarea>
  <input name="bot-field"/>
</form>
</body>
</html>
